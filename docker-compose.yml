services:
  memory-service:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_PATH: /data/memory.db
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
    volumes:
      - memory_data:/data
    restart: unless-stopped

volumes:
  memory_data:
